<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED - Control Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .logo {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .avatar {
            width: 24px;
            height: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .btn-text:hover {
            color: var(--text-main);
        }

        /* Access Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface);
            padding: 0.25rem 0.5rem 0.25rem 0.75rem;
            border-radius: 99px;
            border: 1px solid var(--border);
        }

        .toggle-wrapper span {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: var(--text-main); transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(14px); }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Sidebar Info */
        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .data-row {
            margin-bottom: 0.75rem;
        }
        .data-row:last-child { margin-bottom: 0; }

        .data-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .data-value {
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
            background: var(--bg);
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Terminal Window */
        .terminal-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .terminal-header {
            background: var(--surface);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .terminal-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-left: 0.5rem;
        }

        .dots {
            display: flex;
            gap: 0.4rem;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }

        .terminal-output {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #d4d4d8;
            line-height: 1.5;
        }

        .log { margin-bottom: 0.5rem; }
        .log.prompt { color: var(--primary); }
        .log.system { color: var(--text-muted); }
        .log.error { color: var(--danger); }

        .terminal-input-bar {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .prompt-symbol {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            margin-right: 1rem;
            font-size: 0.85rem;
        }

        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .workspace { flex-direction: column; padding: 1rem; }
            .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .card { flex: 1; min-width: 250px; }
            header { padding: 1rem; }
            .user-info span { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ALFRED Dashboard</div>
        <div class="user-controls">
            <div class="toggle-wrapper">
                <span id="statusText">Offline</span>
                <label class="switch">
                    <input type="checkbox" id="accessToggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="user-info">
                <div class="avatar" id="avatarChar">?</div>
                <span id="headerName">Loading...</span>
            </div>
            
            <button class="btn-text" id="logoutBtn">Log out</button>
        </div>
    </header>

    <div class="workspace">
        <aside class="sidebar">
            <div class="card">
                <div class="card-title">Identity</div>
                <div class="data-row">
                    <div class="data-label">Username</div>
                    <div class="data-value" id="infoUser">...</div>
                </div>
                <div class="data-row" style="margin-top: 1rem;">
                    <div class="data-label">API Key</div>
                    <div class="data-value" id="infoKey">...</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">Connection</div>
                <div class="data-row">
                    <div class="data-label">Environment</div>
                    <div class="data-value" style="color: var(--success); border-color: rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05);">Vercel Serverless</div>
                </div>
            </div>
        </aside>

        <main class="terminal-wrapper">
            <div class="terminal-header">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="terminal-title">alfred_console_v4</div>
            </div>
            
            <div class="terminal-output" id="outputBox">
                <div class="log system">ALFRED Terminal initialized. Ready for input.</div>
            </div>

            <div class="terminal-input-bar">
                <div class="prompt-symbol" id="promptText">~ $</div>
                <input type="text" id="cmdInput" placeholder="Type a command..." autocomplete="off" autofocus>
            </div>
        </main>
    </div>

    <script>
        const cmdInput = document.getElementById('cmdInput');
        const outputBox = document.getElementById('outputBox');
        const accessToggle = document.getElementById('accessToggle');
        const statusText = document.getElementById('statusText');
        
        let userData = JSON.parse(localStorage.getItem('alfred_user')) || null;

        function updateUI() {
            if (!userData) {
                window.location.href = '/login';
                return;
            }
            
            const u = userData.username;
            document.getElementById('headerName').innerText = u;
            document.getElementById('avatarChar').innerText = u.charAt(0).toUpperCase();
            document.getElementById('infoUser').innerText = u;
            document.getElementById('infoKey').innerText = userData.api_key;
            document.getElementById('promptText').innerText = `${u}@alfred ~ $ `;
            
            if (userData.has_access) {
                accessToggle.checked = true;
                statusText.innerText = 'Online';
                statusText.style.color = 'var(--text-main)';
            } else {
                accessToggle.checked = false;
                statusText.innerText = 'Offline';
                statusText.style.color = 'var(--text-muted)';
            }
        }

        // Handle server-injected session
        const serverUser = {
            username: "{{ user.username if user else '' }}",
            api_key: "{{ user.api_key if user else '' }}",
            has_access: ("{{ 'true' if user and user.has_access else 'false' }}" === "true")
        };

        if (serverUser.username && (!userData || userData.username !== serverUser.username)) {
            userData = serverUser;
            localStorage.setItem('alfred_user', JSON.stringify(userData));
        }

        updateUI();

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('alfred_user');
            window.location.href = '/logout';
        };

        accessToggle.onchange = async () => {
            const newState = accessToggle.checked;
            try {
                const res = await fetch('/toggle_access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: newState })
                });
                const data = await res.json();
                if (data.success) {
                    userData.has_access = newState;
                    localStorage.setItem('alfred_user', JSON.stringify(userData));
                    updateUI();
                } else {
                    accessToggle.checked = !newState;
                }
            } catch (err) {
                accessToggle.checked = !newState;
            }
        };

        let cmdHistory = [];
        let historyIdx = -1;

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cmdHistory.length > 0 && historyIdx < cmdHistory.length - 1) {
                    historyIdx++;
                    cmdInput.value = cmdHistory[historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    cmdInput.value = cmdHistory[historyIdx];
                } else {
                    historyIdx = -1;
                    cmdInput.value = '';
                }
            } else if (e.key === 'Enter' && cmdInput.value.trim() !== '') {
                const command = cmdInput.value.trim();
                cmdInput.value = '';
                
                cmdHistory.unshift(command);
                historyIdx = -1;

                appendLog(`> ${command}`, 'prompt');

                try {
                    const response = await fetch('/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: userData.username, 
                            api_key: userData.api_key,
                            command: command
                        })
                    });

                    const data = await response.json();
                    
                    if (data.disconnect) {
                        appendLog("Connection terminated by host.", 'system');
                        setTimeout(() => { window.location.href = '/logout'; }, 1000);
                        return;
                    }

                    if (data.success) {
                        appendLog(data.response, 'system');
                    } else {
                        appendLog(data.error, 'error');
                    }
                } catch (err) {
                    appendLog("Network error. Command undelivered.", 'error');
                }
            }
        });

        function appendLog(text, type) {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerText = text;
            outputBox.appendChild(div);
            outputBox.scrollTop = outputBox.scrollHeight;
        }
    </script>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
