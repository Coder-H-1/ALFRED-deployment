<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --error: #ef4444;
            --success: #10b981;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        form {
            background: var(--surface);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--primary-invert);
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .msg-box {
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .msg-error {
            color: var(--error);
        }

        .msg-success {
            color: var(--success);
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">ALFRED</div>
            <div class="subtitle">Create a new operative identity</div>
        </div>

        <form id="signupForm">
            <div id="msgBox" class="msg-box"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required autofocus>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
            </div>
            
            <button type="submit" class="btn">Register</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const msgBox = document.getElementById('msgBox');

        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            msgBox.style.display = 'none';
            msgBox.className = 'msg-box';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.innerText = "Registration complete. Redirecting...";
                    msgBox.classList.add('msg-success');
                    msgBox.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    msgBox.innerText = data.error || "Registration failed.";
                    msgBox.classList.add('msg-error');
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                msgBox.innerText = "Connection lost. Backend unreachable.";
                msgBox.classList.add('msg-error');
                msgBox.style.display = 'block';
            }
        };
    </script>
</body>
</html>
