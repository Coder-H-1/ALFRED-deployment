<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED v1.0 - Establish Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #666666;
            --primary: #ffffff;
            --primary-invert: #000000;
            --error: #ff4444;
            --success: #00ff88;
            --radius: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            zoom: 1.1; /* Default 110% zoom */
        }

        .card {
            width: 100%;
            max-width: 360px;
            padding: 2.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo { font-size: 1rem; font-weight: 700; letter-spacing: 0.3em; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

        form { display: flex; flex-direction: column; gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        input {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.8rem;
            color: white;
            border-radius: var(--radius);
            font-size: 0.9rem;
            outline: none;
        }

        input:focus { border-color: #444; }

        .btn {
            background: var(--primary);
            color: var(--primary-invert);
            border: none;
            padding: 0.8rem;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn:hover { opacity: 0.9; }

        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--text-muted); }
        .footer a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        #msgBox { font-size: 0.75rem; text-align: center; margin-bottom: 1rem; display: none; }
        .msg-error { color: var(--error); }
        .msg-success { color: var(--success); }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">A.L.F.R.E.D</div>
            <div class="subtitle">Initialize Identity</div>
        </div>

        <div id="msgBox"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>Master Name</label>
                <input type="text" id="name" placeholder="UNIQUE ACCOUNT NAME" required>
            </div>
            <div class="form-group">
                <label>First Device</label>
                <input type="text" id="device_username" placeholder="PRIMARY_RELAY" required>
            </div>
            <div class="form-group">
                <label>Passphrase</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Establish</button>
        </form>

        <div class="footer">
            Already established? <a href="/login">Authorize</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const mb = document.getElementById('msgBox');
            mb.style.display = 'none';
            mb.className = '';

            const name = document.getElementById('name').value;
            const device_username = document.getElementById('device_username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, device_username, password, browser_info: navigator.userAgent })
                });

                const data = await response.json();
                if (response.ok) {
                    mb.innerText = "IDENTITY ESTABLISHED";
                    mb.className = 'msg-success';
                    mb.style.display = 'block';
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    mb.innerText = data.error || "INITIALIZATION FAILED";
                    mb.className = 'msg-error';
                    mb.style.display = 'block';
                }
            } catch (err) {
                mb.innerText = "RELAY OFFLINE";
                mb.className = 'msg-error';
                mb.style.display = 'block';
            }
        };

        // Auto-fill from QR/URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const accName = params.get('account');
            if (accName) {
                document.getElementById('name').value = accName;
                document.getElementById('device_username').focus();
            }
        };
    </script>
</body>
</html>
