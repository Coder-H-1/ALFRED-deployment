<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED - Control Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 8px;
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f4f4f5;
            --border: #e4e4e7;
            --text-main: #09090b;
            --text-muted: #71717a;
            --primary: #000000;
            --primary-invert: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Top Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.1em;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .btn-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .btn-text:hover {
            color: var(--text-main);
        }

        /* Main Workspace Split */
        .workspace {
            flex: 1;
            display: flex;
            padding: 1.5rem;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Terminal Window (Left) */
        .terminal-wrapper {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: #000000;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .terminal-header {
            background: var(--surface);
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .terminal-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-left: 0.5rem;
        }

        .dots { display: flex; gap: 0.4rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }

        .terminal-output {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #d4d4d8;
            line-height: 1.5;
        }

        .log { margin-bottom: 0.5rem; }
        .log.prompt { color: var(--primary); }
        .log.system { color: var(--text-muted); }
        .log.error { color: var(--danger); }

        .terminal-input-bar {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #09090b;
            border-top: 1px solid var(--border);
        }

        .prompt-symbol {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            margin-right: 1rem;
            font-size: 0.85rem;
        }

        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        /* Devices Panel (Right) */
        .devices-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .device-add-btn {
            background: var(--primary);
            color: var(--primary-invert);
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .device-add-btn:hover { opacity: 0.9; }

        .device-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .device-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .device-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .device-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .device-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.75rem;
            word-break: break-all;
        }

        /* Access Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-wrapper span {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .2s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: var(--text-main); transition: .2s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(14px); }

        /* Dropdown menu */
        /* Basic implementation for About User / Signout */
        .dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: var(--surface);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            z-index: 1;
            padding: 0.5rem 0;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a, .dropdown-content button {
            color: var(--text-main);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .dropdown-content button:hover { background-color: var(--bg); }

        @media (max-width: 768px) {
            .workspace { flex-direction: column; padding: 1rem; }
            .terminal-wrapper { min-height: 400px; }
            .devices-panel { min-height: 300px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">A.L.F.R.E.D</div>
        <div class="user-controls">
            <button class="btn-text" id="themeBtn">Toggle Theme</button>
            <div class="dropdown">
                <button class="btn-text" id="userMenuBtn">Account Menu ▼</button>
                <div class="dropdown-content">
                    <button id="aboutBtn">About User</button>
                    <button id="logoutBtn" style="color: var(--danger);">Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <div class="workspace">
        <main class="terminal-wrapper">
            <div class="terminal-header">
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="terminal-title">alfred_relay_v5</div>
            </div>
            
            <div class="terminal-output" id="outputBox">
                <div class="log system">ALFRED Cloud Relay initialized. Connected to Vercel Gateway.</div>
                <div class="log system" style="color: var(--text-muted); font-size: 0.75rem;">Waiting for target device selection...</div>
            </div>

            <div class="terminal-input-bar">
                <div class="prompt-symbol" id="promptText">~ $</div>
                <input type="text" id="cmdInput" placeholder="Select a device to send commands..." autocomplete="off" disabled>
            </div>
        </main>
        
        <aside class="devices-panel">
            <div class="panel-header">
                <div class="panel-title">Registered Devices</div>
                <button class="device-add-btn" onclick="window.location.href='/signup'">+ Add Device</button>
            </div>
            <div class="device-list" id="deviceList">
                <!-- Devices injected here -->
            </div>
        </aside>
    </div>

    <!-- Data payload from Flask -->
    <script>
        const rawUserData = {{ user | tojson | safe if user else 'null' }};
    </script>

    <script>
        const cmdInput = document.getElementById('cmdInput');
        const outputBox = document.getElementById('outputBox');
        const deviceList = document.getElementById('deviceList');
        const promptText = document.getElementById('promptText');
        
        let userData = JSON.parse(localStorage.getItem('alfred_user_v5')) || rawUserData;
        let selectedDevice = null;

        // Sync local storage on load
        if (rawUserData && rawUserData.name) {
            userData = rawUserData;
            localStorage.setItem('alfred_user_v5', JSON.stringify(userData));
        }

        if (!userData || !userData.name) {
            window.location.href = '/login';
        }
        
        // Theme Toggle
        let isLightMode = localStorage.getItem('alfred_theme') === 'light';
        if (isLightMode) document.body.dataset.theme = 'light';
        
        document.getElementById('themeBtn').onclick = () => {
            isLightMode = !isLightMode;
            if (isLightMode) {
                document.body.dataset.theme = 'light';
                localStorage.setItem('alfred_theme', 'light');
            } else {
                delete document.body.dataset.theme;
                localStorage.setItem('alfred_theme', 'dark');
            }
        };

        // Render Devices Panel
        function renderDevices() {
            deviceList.innerHTML = '';
            if (!userData.devices || userData.devices.length === 0) {
                deviceList.innerHTML = '<div style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 2rem;">No devices found.</div>';
                return;
            }

            userData.devices.forEach((dev) => {
                const card = document.createElement('div');
                card.className = `device-card ${selectedDevice === dev.device_username ? 'selected' : ''}`;
                card.onclick = (e) => {
                    // Prevent selecting if clicking toggle
                    if (e.target.tagName.toLowerCase() !== 'input' && e.target.tagName.toLowerCase() !== 'span') {
                        selectDevice(dev.device_username);
                    }
                };

                const isOnline = dev.has_access;
                
                card.innerHTML = `
                    <div class="device-header">
                        <div class="device-name">${dev.device_username}</div>
                        <div class="toggle-wrapper">
                            <span style="color: ${isOnline ? 'var(--success)' : 'var(--text-muted)'}">${isOnline ? 'Enabled' : 'Disabled'}</span>
                            <label class="switch">
                                <input type="checkbox" onchange="toggleAccess('${dev.device_username}', this.checked)" ${isOnline ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="device-info">API: ${dev.api_key.substring(0,8)}...</div>
                    <div class="device-info" style="color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${dev.browser_info}</div>
                `;
                deviceList.appendChild(card);
            });
            
            // Auto-select first device if none selected
            if (!selectedDevice && userData.devices.length > 0) {
                selectDevice(userData.devices[0].device_username);
            }
        }

        function selectDevice(deviceUser) {
            selectedDevice = deviceUser;
            
            // Re-render to update selected styling
            renderDevices();
            
            const dev = userData.devices.find(d => d.device_username === deviceUser);
            if (dev && dev.has_access) {
                cmdInput.disabled = false;
                cmdInput.placeholder = `Send command to ${deviceUser}...`;
                promptText.innerText = `${userData.name}@${deviceUser} ~ $ `;
            } else {
                cmdInput.disabled = true;
                cmdInput.placeholder = `Device ${deviceUser} is disabled.`;
                promptText.innerText = `[LOCKED] ~ $ `;
            }
            cmdInput.focus();
        }

        async function toggleAccess(deviceUsername, newState) {
            try {
                const res = await fetch('/toggle_access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_username: deviceUsername, state: newState })
                });
                const data = await res.json();
                if (data.success) {
                    const devIdx = userData.devices.findIndex(d => d.device_username === deviceUsername);
                    if (devIdx > -1) {
                        userData.devices[devIdx].has_access = newState;
                        localStorage.setItem('alfred_user_v5', JSON.stringify(userData));
                    }
                    renderDevices();
                    if (selectedDevice === deviceUsername) selectDevice(deviceUsername); // refresh input state
                } else {
                    renderDevices(); // Revert toggle UI
                }
            } catch (err) {
                renderDevices();
            }
        }

        // Initialize UI
        renderDevices();

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('alfred_user_v5');
            window.location.href = '/logout';
        };
        
        document.getElementById('aboutBtn').onclick = () => {
            appendLog(`Master Name: ${userData.name}`, 'system');
            appendLog('Active Vercel Ephemeral Environment', 'system');
        };

        let cmdHistory = [];
        let historyIdx = -1;

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (cmdHistory.length > 0 && historyIdx < cmdHistory.length - 1) {
                    historyIdx++;
                    cmdInput.value = cmdHistory[historyIdx];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx > 0) {
                    historyIdx--;
                    cmdInput.value = cmdHistory[historyIdx];
                } else {
                    historyIdx = -1;
                    cmdInput.value = '';
                }
            } else if (e.key === 'Enter' && cmdInput.value.trim() !== '') {
                const command = cmdInput.value.trim();
                cmdInput.value = '';
                
                cmdHistory.unshift(command);
                historyIdx = -1;

                appendLog(`> ${command}`, 'prompt');

                try {
                    const response = await fetch('/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            device_username: selectedDevice,
                            command: command
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        appendLog(`[QUEUED] ${data.response}`, 'system');
                        appendLog(`ALFRED Local Listener on '${selectedDevice}' will execute this shortly.`, 'system');
                    } else if (data.error) {
                        appendLog(data.error, 'error');
                    }
                } catch (err) {
                    appendLog("Network error. Command undelivered.", 'error');
                }
            }
        });

        function appendLog(text, type) {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerText = text;
            outputBox.appendChild(div);
            outputBox.scrollTop = outputBox.scrollHeight;
        }
    </script>
</body>
</html>
