<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED v1.0 - Command Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;610;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --surface-secondary: #141414;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #888888;
            --primary: #ffffff;
            --primary-invert: #000000;
            --success: #00ff88;
            --danger: #ff4444;
            --radius: 4px;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f9f9f9;
            --surface-secondary: #f0f0f0;
            --border: #e0e0e0;
            --text-main: #111111;
            --text-muted: #666666;
            --primary: #000000;
            --primary-invert: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* --- Header --- */
        header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .account-dropdown {
            position: relative;
        }

        .btn-menu {
            background: var(--surface-secondary);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            padding: 0.5rem 0;
        }

        .account-dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-item {
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            border: none;
            background: none;
            color: var(--text-main);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dropdown-item:hover {
            background: var(--surface-secondary);
        }

        /* --- Main Layout --- */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 300px; /* Terminal Left (flexible), Devices Right (fixed) */
            overflow: hidden;
        }

        /* --- Terminal Block --- */
        .terminal-container {
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .terminal-header {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .terminal-status {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        .terminal-output {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #eeeeee;
        }

        .log-entry { margin-bottom: 0.4rem; }
        .log-prompt { color: #555555; }
        .log-cmd { color: var(--success); }
        .log-sys { color: #888888; font-style: italic; }

        .terminal-input-bar {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .prompt-text {
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        #cmdInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        /* --- Devices Block --- */
        .devices-panel {
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .device-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .device-item {
            padding: 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 0.25rem;
            border: 1px solid transparent;
        }

        .device-item:hover {
            background: var(--surface-secondary);
        }

        .device-item.active {
            background: var(--surface-secondary);
            border-color: var(--border);
        }

        .device-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .device-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; }
            .devices-panel { display: none; } /* Hide panel on mobile to focus on terminal */
        }
    </style>
</head>
<body data-theme="dark">
    <header>
        <div class="logo">A.L.F.R.E.D</div>
        <div class="nav-controls">
            <div class="account-dropdown">
                <button class="btn-menu">
                    <span id="displayAccountName">Account</span>
                    <small>▼</small>
                </button>
                <div class="dropdown-content">
                    <div class="dropdown-item" id="themeToggleBtn">
                        App Theme <span id="themeLabel">Dark</span>
                    </div>
                    <div class="dropdown-item" onclick="alert('v1.0.0-relay\nTarget: project-alfred-custom-gpt.vercel.app')">
                        Version <span>1.0.0</span>
                    </div>
                    <hr style="border: none; border-top: 1px solid var(--border); margin: 0.5rem 0;">
                    <a href="/logout" class="dropdown-item" style="color: var(--danger); text-decoration: none;">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <div class="workspace">
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-status">
                    <div class="status-dot"></div>
                    RELAY CONNECTED // TARGET: <span id="activeDeviceName">NONE</span>
                </div>
            </div>
            
            <div class="terminal-output" id="termOutput">
                <div class="log-entry log-sys">ALFRED Relay Initialized. Waiting for device handshake...</div>
            </div>

            <div id="noDeviceSplash" style="display: none; flex: 1; align-items: center; justify-content: center; background: #000; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.9rem; text-align: center; padding: 2rem;">
                <div>
                    <div style="font-size: 2rem; margin-bottom: 1rem;">⚠</div>
                    PLEASE ADD A DEVICE TO SEND COMMANDS TO
                </div>
            </div>

            <div class="terminal-input-bar">
                <div class="prompt-text" id="termPrompt">> _</div>
                <input type="text" id="cmdInput" placeholder="Select a device to start..." autocomplete="off" disabled>
            </div>
        </div>

        <aside class="devices-panel">
            <div class="panel-header">Registered Devices</div>
            <div class="device-list" id="deviceList">
                <!-- Devices injected here -->
            </div>
        </aside>
    </div>

    <script>
        const rawUserData = {{ user | tojson | safe if user else 'null' }};
        const termOutput = document.getElementById('termOutput');
        const cmdInput = document.getElementById('cmdInput');
        const deviceList = document.getElementById('deviceList');
        const activeDeviceLabel = document.getElementById('activeDeviceName');
        const termPrompt = document.getElementById('termPrompt');

        let selectedDevice = null;
        let userData = JSON.parse(localStorage.getItem('alfred_v1_user')) || rawUserData;

        if (rawUserData) {
            userData = rawUserData;
            localStorage.setItem('alfred_v1_user', JSON.stringify(userData));
        }

        if (!userData || !userData.name) {
            window.location.href = '/login';
        }

        document.getElementById('displayAccountName').innerText = userData.name;

        // --- Theme Engine ---
        function applyTheme(theme) {
            document.body.dataset.theme = theme;
            document.getElementById('themeLabel').innerText = theme === 'light' ? 'Light' : 'Dark';
            localStorage.setItem('alfred_v1_theme', theme);
        }

        const savedTheme = localStorage.getItem('alfred_v1_theme') || 'dark';
        applyTheme(savedTheme);

        document.getElementById('themeToggleBtn').onclick = () => {
            const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        };

        // --- Device Management ---
        function renderDevices() {
            deviceList.innerHTML = '';
            if (!userData.devices || userData.devices.length === 0) {
                deviceList.innerHTML = '<div style="padding: 1rem; color: var(--text-muted); font-size: 0.8rem;">No devices found.</div>';
                return;
            }

            userData.devices.forEach(dev => {
                const item = document.createElement('div');
                item.className = `device-item ${selectedDevice === dev.device_username ? 'active' : ''}`;
                item.onclick = () => selectDevice(dev.device_username);
                
                item.innerHTML = `
                    <div class="device-name">${dev.device_username === 'current_device' ? 'Current Device' : dev.device_username}</div>
                    <div class="device-meta">API: ${dev.api_key.substring(0,8)}...</div>
                    <div class="device-meta">${dev.browser_info.substring(0,25)}...</div>
                `;
                deviceList.appendChild(item);
            });

            if (userData.devices.length === 0) {
                document.getElementById('noDeviceSplash').style.display = 'flex';
                termOutput.style.display = 'none';
                cmdInput.disabled = true;
            } else {
                document.getElementById('noDeviceSplash').style.display = 'none';
                termOutput.style.display = 'block';
            }
        }

        function selectDevice(devUser) {
            selectedDevice = devUser;
            activeDeviceLabel.innerText = (devUser === 'current_device' ? 'Current Device' : devUser).toUpperCase();
            cmdInput.disabled = false;
            cmdInput.placeholder = `Send command to ${devUser}...`;
            termPrompt.innerText = `${devUser.toLowerCase()}@relayserver ~ $ `;
            renderDevices();
            cmdInput.focus();
            appendLog(`Target switched to ${devUser}`, 'sys');
        }

        function appendLog(text, type) {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            
            if (type === 'cmd') {
                entry.innerHTML = `<span class="log-prompt">$</span> ${text}`;
            } else {
                entry.innerText = text;
            }

            termOutput.appendChild(entry);
            termOutput.scrollTop = termOutput.scrollHeight;
        }

        cmdInput.onkeydown = async (e) => {
            if (e.key === 'Enter' && cmdInput.value.trim()) {
                const command = cmdInput.value.trim();
                cmdInput.value = '';
                
                appendLog(command, 'cmd');

                try {
                    const response = await fetch('/execute', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            device_username: selectedDevice,
                            command: command
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        appendLog(`Relay success: ${data.response}`, 'sys');
                    } else {
                        appendLog(`Relay error: ${data.error || 'Unknown error'}`, 'sys text-danger');
                    }
                } catch (err) {
                    appendLog('Relay failed: Network unreachable.', 'sys text-danger');
                }
            }
        };

        // Init
        renderDevices();
        if (userData.devices.length > 0) {
            selectDevice(userData.devices[0].device_username);
        }

    </script>
</body>
</html>
