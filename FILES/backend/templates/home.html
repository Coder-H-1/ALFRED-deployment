<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED - Neural Operating System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --hover: #f4f4f5;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .btn {
            background: var(--primary);
            color: var(--primary-invert) !important;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-weight: 500;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main) !important;
        }

        .btn-outline:hover {
            background: var(--surface);
            opacity: 1;
        }

        /* Hero */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
        }

        p.subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
        }

        .hero-actions .btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .hero-actions { flex-direction: column; width: 100%; padding: 0 1rem; }
            .nav-links a:not(.btn) { display: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">ALFRED OS</div>
        <div class="nav-links">
            <a href="/login">Log in</a>
            <a href="/signup" class="btn">Get Started</a>
        </div>
    </nav>

    <main class="hero">
        <div class="badge">Production Ready</div>
        <h1>Control your devices from anywhere.</h1>
        <p class="subtitle">ALFRED is a secure API that bridges the gap between natural language commands and local system execution, directly to your Android device.</p>
        <div class="hero-actions">
            <a href="/signup" class="btn">Initialize System</a>
            <a href="/login" class="btn btn-outline">Access Console</a>
        </div>
    </main>

    <footer>
        &copy; 2026 ALFRED Intelligence System
    </footer>
</body>
</html>
