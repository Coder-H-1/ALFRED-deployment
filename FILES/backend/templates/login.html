<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED - Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #ffffff;
            --primary-invert: #000000;
            --error: #ef4444;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        form {
            background: var(--surface);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: var(--primary-invert);
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">ALFRED</div>
            <div class="subtitle">Enter your credentials to access the console</div>
        </div>

        <form id="loginForm">
            <div id="errorBox" class="error-msg"></div>

            <div class="form-group">
                <label>Master Name</label>
                <input type="text" id="name" placeholder="John" required autofocus>
            </div>
            
            <div class="form-group">
                <label>Device Name (Username)</label>
                <input type="text" id="device_username" placeholder="Desktop-PC" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="footer">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';

            const name = document.getElementById('name').value;
            const device_username = document.getElementById('device_username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, device_username, password })
                });

                if (response.ok) {
                    window.location.href = '/dashboard'; 
                } else {
                    errorBox.innerText = "Invalid credentials.";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = "Connection lost. Backend unreachable.";
                errorBox.style.display = 'block';
            }
        };
    </script>
</body>
</html>
